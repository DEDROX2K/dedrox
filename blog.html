<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Article</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=IBM+Plex+Mono:ital,wght@0,100..700;1,100..700&display=swap');

    :root {
      color-scheme: light;
      --paper: #ffffff;
      --paper-strong: #f8f9fa;
      --ink: #202124;
      --ink-soft: #3c4043;
      --ink-faint: #5f6368;
      --line: #dadce0;
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: "Google Sans", -apple-system, BlinkMacSystemFont, sans-serif;
      scrollbar-width: thin;
      scrollbar-color: rgba(95, 99, 104, 0.2) transparent;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      padding: 0;
    }

    html::-webkit-scrollbar,
    body::-webkit-scrollbar {
      width: 8px;
    }

    html::-webkit-scrollbar-track,
    body::-webkit-scrollbar-track {
      background: transparent;
    }

    html::-webkit-scrollbar-thumb,
    body::-webkit-scrollbar-thumb {
      background: rgba(95, 99, 104, 0.2);
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    html::-webkit-scrollbar-thumb:hover,
    body::-webkit-scrollbar-thumb:hover {
      background: rgba(95, 99, 104, 0.3);
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    a {
      color: inherit;
    }

    .article-shell {
      width: min(100%, 780px);
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    .article-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 0 0 16px;
      border-bottom: 1px solid var(--line);
    }

    .article-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.88rem;
      font-weight: 500;
      line-height: 1.1;
      text-decoration: none;
      color: var(--ink-faint);
      transition: color 0.15s ease, transform 0.15s ease;
    }

    .article-back:hover {
      color: var(--ink);
      transform: translateX(-3px);
    }

    .article-kicker {
      font-size: 0.75rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0.08em;
      color: var(--ink-faint);
      text-transform: uppercase;
    }

    .article-grid {
      display: block;
      padding-top: 36px;
    }

    .article-label {
      display: none;
    }

    .article-main {
      min-width: 0;
    }

    .article-hero {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--line);
    }

    .article-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 16px;
      align-items: center;
      color: var(--ink-faint);
      font-size: 0.88rem;
      line-height: 1.2;
    }

    .article-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 8px;
    }

    .article-tag {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border: 1px solid var(--line);
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 500;
      line-height: 1.2;
      text-transform: uppercase;
      color: var(--ink-faint);
      background: var(--paper-strong);
    }

    .article-tag.tag-yellow {
      background: #fef7e0;
      border-color: #feefc3;
      color: #b06000;
    }

    .article-tag.tag-lime {
      background: #e6f4ea;
      border-color: #ceead6;
      color: #137333;
    }

    .article-tag.tag-sky {
      background: #e8f0fe;
      border-color: #d2e3fc;
      color: #1a73e8;
    }

    .article-tag.tag-coral {
      background: #fce8e6;
      border-color: #fad2cf;
      color: #c5221f;
    }

    .article-tag.tag-lilac {
      background: #f3e8fd;
      border-color: #e8d0fc;
      color: #9334e6;
    }

    .article-title {
      margin: 0;
      max-width: 100%;
      font-size: clamp(2rem, 3.5vw, 2.75rem);
      line-height: 1.25;
      letter-spacing: -0.02em;
      font-weight: 500;
      color: var(--ink);
    }

    .article-intro {
      margin: 0;
      max-width: 72ch;
      font-size: clamp(1.05rem, 1.3vw, 1.2rem);
      line-height: 1.5;
      color: var(--ink-soft);
      font-weight: 400;
    }

    .article-body {
      display: flex;
      flex-direction: column;
      gap: 22px;
      padding-top: 28px;
    }

    .article-body > * {
      margin: 0;
      min-width: 0;
    }

    .article-body p,
    .article-body li {
      max-width: 72ch;
      font-size: 1rem;
      line-height: 1.6;
      color: var(--ink-soft);
    }

    .article-body h2,
    .article-body h3,
    .article-body h4 {
      margin: 24px 0 8px;
      max-width: 100%;
      line-height: 1.3;
      letter-spacing: -0.01em;
      font-weight: 500;
      color: var(--ink);
    }

    .article-body h2 {
      font-size: clamp(1.3rem, 2vw, 1.6rem);
    }

    .article-body h3 {
      font-size: clamp(1.15rem, 1.6vw, 1.35rem);
    }

    .article-body ul,
    .article-body ol {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-left: 20px;
      margin: 8px 0;
    }

    .article-body strong {
      font-weight: 700;
      color: var(--ink);
    }

    .article-body blockquote {
      padding: 12px 20px;
      border-left: 4px solid var(--ink-faint);
      background: var(--paper-strong);
      color: var(--ink-soft);
      border-radius: 4px;
      margin: 16px 0;
      max-width: 72ch;
    }

    pre {
      background: #202124;
      color: #f1f3f4;
      padding: 16px 20px;
      border-radius: 8px;
      overflow-x: auto;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.88rem;
      line-height: 1.5;
      margin: 20px 0;
      border: 1px solid var(--line);
    }

    code {
      font-family: 'IBM Plex Mono', monospace;
      background: var(--paper-strong);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.88em;
      color: #c5221f;
      border: 1px solid rgba(0,0,0,0.05);
    }

    pre code {
      background: transparent;
      padding: 0;
      border-radius: 0;
      font-size: inherit;
      color: inherit;
      border: none;
    }

    .article-body img {
      width: 100%;
      max-width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
      border: 1px solid var(--line);
      margin: 24px auto;
    }

    html.is-embedded .article-header {
      display: none;
    }

    html.is-embedded .article-shell {
      padding-top: 20px;
    }

    html.is-embedded .article-grid {
      padding-top: 10px;
    }

    .article-body hr {
      width: 100%;
      border: 0;
      border-top: 1px solid var(--line);
      margin: 28px 0;
    }

    .article-status {
      margin: 0;
      font-size: 1rem;
      line-height: 1.4;
      color: var(--ink-soft);
    }

    @media (max-width: 760px) {
      .article-shell {
        padding: 20px 16px 40px;
      }

      .article-header {
        align-items: flex-start;
        flex-direction: column;
        gap: 10px;
      }

      .article-grid {
        padding-top: 20px;
      }

      .article-title {
        font-size: clamp(1.8rem, 8vw, 2.4rem);
      }

      .article-intro,
      .article-body p,
      .article-body li,
      .article-body blockquote {
        font-size: 1rem;
      }
    }
  </style>
</head>

<body>
  <div class="article-shell">
    <header class="article-header">
      <a class="article-back" href="./index.html">← Back to all posts</a>
      <div class="article-kicker">Journal</div>
    </header>

    <main class="article-grid" aria-live="polite">
      <div class="article-label">Article</div>
      <article class="article-main">
        <section class="article-hero">
          <div class="article-meta" id="article-meta"></div>
          <h1 class="article-title" id="article-title">Loading article...</h1>
          <p class="article-intro" id="article-intro"></p>
        </section>
        <section class="article-body" id="blog-content"></section>
      </article>
    </main>
  </div>

  <script>
    document.documentElement.classList.toggle('is-embedded', window.self !== window.top);

    const contentEl = document.getElementById('blog-content');
    const titleEl = document.getElementById('article-title');
    const introEl = document.getElementById('article-intro');
    const metaEl = document.getElementById('article-meta');

    marked.setOptions({
      headerIds: false,
      mangle: false
    });

    const renderError = (message) => {
      titleEl.textContent = 'Article unavailable';
      introEl.textContent = '';
      metaEl.innerHTML = '';
      contentEl.innerHTML = `<p class="article-status">${message}</p>`;
    };

    const getPostFilename = () => {
      const params = new URLSearchParams(window.location.search);
      const post = params.get('post');
      if (!post) return null;

      const isValidPattern = /^[a-zA-Z0-9._-]+\.md$/.test(post);
      const hasTraversal = post.includes('..') || post.includes('/') || post.includes('\\');

      if (!isValidPattern || hasTraversal) return null;
      return post;
    };

    const formatDate = (rawDate) => {
      const date = new Date(rawDate);
      if (Number.isNaN(date.getTime())) return '';

      return new Intl.DateTimeFormat('en-GB', {
        day: '2-digit',
        month: 'short',
        year: 'numeric'
      }).format(date);
    };

    const toTitleCase = (value) => String(value || '')
      .split('-')
      .map((part) => part ? part.charAt(0).toUpperCase() + part.slice(1) : '')
      .join(' ');

    const extractIntro = (root) => {
      const firstParagraph = root.querySelector('p');
      return firstParagraph ? firstParagraph.textContent.trim() : '';
    };

    const renderMeta = (postMeta) => {
      const bits = [];
      const formattedDate = formatDate(postMeta?.date);
      const tags = Array.isArray(postMeta?.tags) ? postMeta.tags : [];
      const tagPalette = ['tag-yellow', 'tag-lime', 'tag-sky', 'tag-coral', 'tag-lilac'];

      if (formattedDate) {
        bits.push(`<span>${formattedDate}</span>`);
      }

      if (tags.length) {
        const tagsMarkup = tags.map((tag, index) => `<span class="article-tag ${tagPalette[index % tagPalette.length]}">${toTitleCase(tag)}</span>`).join('');
        bits.push(`<div class="article-tags">${tagsMarkup}</div>`);
      }

      metaEl.innerHTML = bits.join('');
    };

    const loadPost = async () => {
      const fileName = getPostFilename();

      if (!fileName) {
        renderError('Missing or invalid post parameter.');
        return;
      }

      try {
        const [postsResponse, markdownResponse] = await Promise.all([
          fetch('./posts.json', { cache: 'no-store' }),
          fetch(`./posts/${fileName}`, { cache: 'no-store' })
        ]);

        if (markdownResponse.status === 404) {
          renderError('Post not found.');
          return;
        }

        if (!markdownResponse.ok) {
          throw new Error(`Failed to load post (${markdownResponse.status})`);
        }

        const markdown = await markdownResponse.text();
        const parsedHtml = marked.parse(markdown);
        contentEl.innerHTML = parsedHtml;

        const matchedPost = postsResponse.ok
          ? (await postsResponse.json()).find((post) => post && post.file === fileName)
          : null;

        const heading = contentEl.querySelector('h1');
        const fallbackTitle = matchedPost?.title || 'Untitled Post';
        const title = heading ? heading.textContent.trim() : fallbackTitle;

        titleEl.textContent = title;
        document.title = `${title} | Blog`;
        renderMeta(matchedPost);

        if (heading) {
          heading.remove();
        }

        introEl.textContent = extractIntro(contentEl);

        const firstParagraph = contentEl.querySelector('p');
        if (firstParagraph) {
          firstParagraph.remove();
        }
      } catch (error) {
        console.error(error);
        renderError('Unable to load this article right now.');
      }
    };

    loadPost();
  </script>
</body>

</html>
