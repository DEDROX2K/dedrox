<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download AirPaste | The Vault for your Digital Self</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Mansalva&family=Playfair+Display:wght@700&display=swap">
    <link rel="stylesheet" href="airpaste.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script src="cube-trail.js" defer></script>
    <script src="navbar-logic.js" defer></script>
    <style>
        html {
            background: #000;
        }

        body {
            background: transparent !important;
            margin: 0;
            padding: 0;
        }

        .dl-hero {
            /* min-height: 100vh; */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 15vh;
            background: transparent !important;
            text-align: center;
            position: relative;
            z-index: 5;
        }

        .dl-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('images/logobg.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(8px);
            transform: scale(1.1);
            z-index: -1; /* Behind everything */
        }

        .dl-logo-main {
            width: 120px;
            height: auto;
            margin-bottom: 2.5rem;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.1));
        }

        .dl-main-headline {
            font-family: 'p1', serif;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            color: #fff;
            margin-bottom: 1.5rem;
            line-height: 1.1;
            max-width: 900px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .dl-main-btn-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            margin-top: 1rem;
        }

        .dl-cta-btn {
            background: #111;
            color: #fff;
            padding: 20px 45px;
            border-radius: 100px;
            font-family: 'fg', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .dl-cta-btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.25);
        }

        .dl-os-note {
            font-family: 'fg', sans-serif;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 500;
        }

        .dl-secondary-link {
            font-family: 'fg', sans-serif;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            margin-top: 1.5rem;
            border-bottom: 1px solid transparent;
            transition: all 0.2s;
        }

        .dl-secondary-link:hover {
            color: #fff;
            border-color: #fff;
        }

        .dl-gallery {
            width: 100%;
            max-width: 1400px;
            margin: 8vh auto 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            padding: 0 5vw;
            box-sizing: border-box;
        }

        .dl-gallery-item {
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            background: #fff;
            transition: transform 0.5s ease;
        }

        .dl-gallery-item img {
            width: 100%;
            height: auto;
            display: block;
        }

        .dl-gallery-item:nth-child(2) {
            transform: translateY(-30px);
        }

        .dl-gallery-item:hover {
            transform: translateY(-40px) scale(1.02);
        }

        @media (max-width: 768px) {
            .dl-gallery {
                grid-template-columns: 1fr;
            }

            .dl-gallery-item:nth-child(2) {
                transform: none;
            }
        }
    </style>
</head>

<body style="overflow-x: hidden;">

    <div class="dl-background"></div>

    <canvas id="cubeCanvas"></canvas>

    <div class="nav-logo">
        <a href="airpaste.html">
            <img src="images/logovar/browserlogo.gif" alt="AirPaste Logo">
        </a>
    </div>

    <nav class="top-nav">
        <div class="nav-toggle-wrapper">
            <div class="nav-toggle-container">
                <div class="nav-toggle-gooey-layer">
                    <div class="nav-toggle-indicator"></div>
                </div>
                <div class="nav-toggle-buttons">
                    <button class="nav-toggle-btn" id="toggleHome">AirPaste</button>
                    <button class="nav-toggle-btn active" id="toggleDownload">Download</button>
                    <button class="nav-toggle-btn" id="toggleShop">Shop</button>
                    <button class="nav-toggle-btn" id="toggleFree">For Free?</button>
                    <button class="nav-toggle-btn" id="toggleNext">What's Next*</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="dl-hero">
        <img src="images/logovar/browserlogo.gif" alt="AirPaste" class="dl-logo-main">

        <h1 class="dl-main-headline">
            The vault<br>built to be yours
        </h1>

        <div class="dl-main-btn-container">
            <a href="#" class="dl-cta-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                Download AirPaste
            </a>
            <p class="dl-os-note">For Windows 11/10 64-bit</p>

            <a href="whatsnext.html" class="dl-secondary-link">I want to see what's next</a>
        </div>
    </main>

    <script>
        // Initialize Global Smooth Scroll (Lenis)
        const lenis = new Lenis();
        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // Entrance animations
        gsap.from('.dl-logo-main', { opacity: 0, y: 20, duration: 1, ease: 'power3.out' });
        gsap.from('.dl-main-headline', { opacity: 0, y: 30, duration: 1, delay: 0.2, ease: 'power3.out' });
        gsap.from('.dl-main-btn-container', { opacity: 0, y: 20, duration: 1, delay: 0.4, ease: 'power3.out' });
        gsap.from('.dl-gallery-item', {
            opacity: 0,
            y: 50,
            duration: 1.2,
            delay: 0.6,
            stagger: 0.2,
            ease: 'power4.out'
        });
    </script>
</body>

</html>
