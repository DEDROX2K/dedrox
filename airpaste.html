<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirPaste | Local-First Bookmark Application</title>
    <meta name="description"
        content="Local-first desktop bookmark and note board built with Electron and React. Keep your data on your own drive. Free beta download.">

    <!-- Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="airpaste.css">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <div class="app-container">

        <!-- STICKER CANVAS SECTION -->
        <section class="sticker-section">
            <div style="margin-bottom: 20px;">
                <h2 style="font-size: 2rem; letter-spacing: -0.04em;">Collaborative Moodboard</h2>
                <p style="color: var(--text-muted);">A place to play. Drag and drop stickers to organize your thoughts.
                </p>
            </div>

            <div class="sticker-canvas" id="sticker-canvas">
                <!-- Stickers will be added here via JS -->
                <div class="sticker-canvas-hint">Drag to move</div>
            </div>
        </section>

    </div>

    <!-- SCRIPT FOR DYNAMIC ELEMENTS -->
    <script>
        // Sticker System
        const stickerCanvas = document.getElementById('sticker-canvas');
        const stickerFiles = [
            'images/f1.png', 'images/f2.png', 'images/f3.png', 'images/f4.png', 'images/f5.png',
            'images/f6.png', 'images/f7.png', 'images/f8.png', 'images/f9.png', 'images/ba3.png'
        ];

        stickerFiles.forEach((file, index) => {
            const sticker = document.createElement('div');
            sticker.className = 'sticker-item';

            const img = document.createElement('img');
            img.src = file;
            sticker.appendChild(img);

            // Random initial position
            const x = Math.random() * (stickerCanvas.offsetWidth - 150);
            const y = Math.random() * (stickerCanvas.offsetHeight - 150);
            sticker.style.left = x + 'px';
            sticker.style.top = y + 'px';
            sticker.style.transform = `rotate(${Math.random() * 20 - 10}deg)`;

            stickerCanvas.appendChild(sticker);
            makeDraggable(sticker);
        });

        function makeDraggable(el) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            el.onmousedown = dragMouseDown;

            function dragMouseDown(e) {
                e = e || window.event;
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;

                // Bring to front
                const stickers = document.querySelectorAll('.sticker-item');
                stickers.forEach(s => s.style.zIndex = 1);
                el.style.zIndex = 1000;
            }

            function elementDrag(e) {
                e = e || window.event;
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;

                let newTop = el.offsetTop - pos2;
                let newLeft = el.offsetLeft - pos1;

                // Simple boundary check
                const canvasRect = stickerCanvas.getBoundingClientRect();
                if (newTop < 0) newTop = 0;
                if (newLeft < 0) newLeft = 0;
                if (newTop > stickerCanvas.offsetHeight - el.offsetHeight) newTop = stickerCanvas.offsetHeight - el.offsetHeight;
                if (newLeft > stickerCanvas.offsetWidth - el.offsetWidth) newLeft = stickerCanvas.offsetWidth - el.offsetWidth;

                el.style.top = newTop + "px";
                el.style.left = newLeft + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }
    </script>

</body>

</html>
