<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirPaste | Local-First Bookmarks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:wght@700&display=swap">
    <link rel="stylesheet" href="airpaste.css">
</head>
<body>

    <section class="hero-section" id="hero">
        <div class="hero-layers">
            <div class="layer layer-5" data-speed="0.2"></div>
            <div class="layer layer-4" data-speed="0.4"></div>
            <div class="layer layer-3" data-speed="0.6"></div>
            <div class="layer layer-2" data-speed="0.8"></div>
            <div class="layer layer-1" data-speed="1.2"></div>
        </div>

        <h1 class="hero-title" data-speed="0.3">AirPaste</h1>

        <div class="floating-label label-top-left" data-speed="0.7">
            Ideas meant to be<br>played with
        </div>

        <div class="floating-label label-mid-right" data-speed="0.5">
            Early Alpha -<br>Windows only*
        </div>

        <div class="floating-label label-bottom-right" data-speed="0.9">
            airpaste isn't built for "synergy" or<br>
            "maximizing deliverables." It's built for<br>
            human beings who want to throw their<br>
            ideas at a wall and watch them bounce.
        </div>

        <div class="btn-parallax-container" id="btnWrapper" data-speed="1.2">
            <button class="hero-btn">Download .EXE</button>
        </div>
    </section>

<script>
    // --- MASTER CONTROLS ---
    const PARALLAX_CONFIG = {
        magnitude: 0.015, // Lowered from 0.03 for a gentler, more subtle effect
        ease: 0.08      // The lower the number, the smoother and more "delayed" the magnet effect is
    };

    const hero = document.getElementById('hero');
    const parallaxElements = document.querySelectorAll('[data-speed]');

    // Variables to track smooth movement
    let targetX = 0;
    let targetY = 0;
    let currentX = 0;
    let currentY = 0;

    hero.addEventListener('mousemove', (e) => {
        // Find distance from the center of the screen
        targetX = (e.clientX - window.innerWidth / 2);
        targetY = (e.clientY - window.innerHeight / 2);
    });

    hero.addEventListener('mouseleave', () => {
        // When mouse leaves, gently pull everything back to the dead center (0,0)
        targetX = 0;
        targetY = 0;
    });

    // The Animation Loop (Fixes the snapping)
    function animateParallax() {
        // "Lerp" formula: slowly close the distance between current position and target position
        currentX += (targetX - currentX) * PARALLAX_CONFIG.ease;
        currentY += (targetY - currentY) * PARALLAX_CONFIG.ease;

        parallaxElements.forEach(el => {
            const speed = parseFloat(el.getAttribute('data-speed'));
            const moveX = currentX * speed * PARALLAX_CONFIG.magnitude;
            const moveY = currentY * speed * PARALLAX_CONFIG.magnitude;
            
            el.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });

        // Keep the loop running endlessly
        requestAnimationFrame(animateParallax);
    }

    // Start the loop
    animateParallax();
</script>
</body>
</html>
