<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AirPaste</title>
  <link rel="stylesheet" href="airpaste-landing.css?v=1" />
</head>
<body class="airpaste-page airpaste-page--home">
  <main class="airpaste-stage">
    <section class="home-layout" aria-label="AirPaste landing card">
      <figure class="home-mockup" aria-label="AirPaste product mockup">
        <picture>
          <source media="(max-width: 640px)" srcset="images/airpaste-mobile.png" />
          <img
            class="home-mockup__image"
            src="images/airpaste-mockup.png"
            alt="AirPaste mockup"
          />
        </picture>
      </figure>

      <a
        class="home-download-cta"
        href="https://drive.google.com/uc?export=download&id=1Cv51GHgsaGfUtPdPy4s-Xb3ARbcBbXbQ"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Download AirPaste beta"
      >
        <span class="home-download-cta__main">Download</span>
        <span class="home-download-cta__sub">
          <span>Beta</span>
          <img
            class="home-download-cta__icon"
            src="iconset/interactions.png"
            alt=""
            aria-hidden="true"
          />
        </span>
      </a>
    </section>
  </main>
</body>
</html>
