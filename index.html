<!DOCTYPE html>
<html>

<head>
  <style>
    :root {
      --brand-orange: #FF9245;
    }

    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: transparent;
      overflow: hidden;
    }

    #interaction-box {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
      gap: 40px;
    }

    #start-button {
      padding: 18px 40px;
      background-color: rgba(255, 146, 69, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 40px;
      font-weight: 500;
      font-size: 1.2rem;
      box-shadow: 0 8px 32px rgba(255, 146, 69, 0.2);
      z-index: 20;
      transition: all 0.5s ease;
      white-space: nowrap;
      letter-spacing: 0.5px;
      margin-top: 20px;
    }

    #start-button:hover {
      background-color: rgba(255, 146, 69, 0.9);
      transform: scale(1.05);
    }

    #breathing-circle {
      width: 280px;
      height: 280px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.8);
      transition: transform 2s ease-out, opacity 2s ease-out;
      margin-top: -20px;
    }

    #breathing-circle.active {
      opacity: 1;
      transform: scale(1);
    }

    #circle-outline {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 1.5px solid rgba(255, 146, 69, 0.3);
      border-radius: 50%;
    }

    #circle-progress-container {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 5;
    }

    #circle-progress-dot {
      position: absolute;
      top: -7px;
      left: 50%;
      transform: translateX(-50%);
      width: 14px;
      height: 14px;
      background: var(--brand-orange);
      border-radius: 50%;
      box-shadow: 0 0 15px var(--brand-orange);
    }

    #circle-inner {
      width: 75%;
      height: 75%;
      background: rgba(255, 146, 69, 0.15);
      backdrop-filter: blur(4px);
      border-radius: 50%;
      z-index: 1;
      transform: scale(0);
      transition: transform 1.33s ease-in-out, box-shadow 1.33s ease-in-out;
    }

    #breathing-label {
      position: absolute;
      color: var(--brand-orange);
      font-weight: 300;
      font-size: 1.2rem;
      letter-spacing: 1.5px;
      z-index: 10;
      opacity: 0.8;
      text-transform: lowercase;
    }

    @keyframes rotate-dot {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes inner-breath {
      0% {
        transform: scale(0);
        box-shadow: 0 0 0px rgba(255, 146, 69, 0);
      }

      50% {
        transform: scale(1);
        box-shadow: 0 0 60px rgba(255, 146, 69, 0.4);
      }

      100% {
        transform: scale(0);
        box-shadow: 0 0 0px rgba(255, 146, 69, 0);
      }
    }

    #mascot-container {
      width: 180px;
      height: 180px;
      position: relative;
      z-index: 15;
      opacity: 0;
      transform: translateY(20px);
      transition: transform 1.5s ease-out, opacity 1.5s ease-out;
    }

    #mascot-container.active {
      opacity: 1;
      transform: translateY(0);
    }

    .mascot-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
      transition: opacity 0.8s ease-in-out;
      will-change: opacity;
    }

    .show {
      opacity: 1;
    }

    .timer {
      position: absolute;
      top: 40px;
      font-size: 0.9rem;
      color: #333;
      opacity: 0.5;
      letter-spacing: 2px;
      font-weight: 300;
      z-index: 20;
    }

    .pattern-container {
      position: absolute;
      width: 500px;
      height: 500px;
      z-index: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 2s ease;
    }

    .pattern-container.active {
      opacity: 1;
    }

    .ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 1.5px dotted #ff9345a1;
      border-radius: 50%;
      animation: move-inward 8s linear infinite;
      opacity: 0;
      filter: blur(1px);
    }

    .ring:nth-child(2) {
      animation-delay: -2s;
    }

    .ring:nth-child(3) {
      animation-delay: -4s;
    }

    .ring:nth-child(4) {
      animation-delay: -6s;
    }

    @keyframes move-inward {
      0% {
        transform: scale(1.4);
        opacity: 0;
      }

      20% {
        opacity: 1;
      }

      80% {
        opacity: 1;
      }

      100% {
        transform: scale(0.6);
        opacity: 0;
      }
    }

    .book-btn {
      padding: 15px 40px;
      background-color: rgba(255, 146, 69, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: white;
      text-decoration: none;
      border-radius: 35px;
      font-weight: 500;
      display: inline-block;
      box-shadow: 0 8px 25px rgba(255, 146, 69, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.3s ease;
    }

    .book-btn:hover {
      background-color: var(--brand-orange);
      transform: translateY(-2px);
    }

    .hidden {
      display: none !important;
    }

    .invisible {
      opacity: 0;
      pointer-events: none;
    }

    #audio-toggle {
      position: absolute;
      bottom: 30px;
      left: 30px;
      padding: 10px;
      cursor: pointer;
      opacity: 0.25;
      transition: opacity 0.3s ease, transform 0.3s ease;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #audio-toggle:hover {
      opacity: 0.6;
      transform: scale(1.1);
    }

    #audio-toggle svg {
      width: 18px;
      height: 18px;
      fill: #333;
    }

    #intro-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      max-width: 600px;
      padding: 20px;
      z-index: 30;
      transition: opacity 0.8s ease;
      color: #333;
    }

    #instructions h2 {
      font-size: 1.5rem;
      font-weight: 500;
      margin-bottom: 25px;
      color: var(--brand-orange);
    }

    #instructions p {
      font-size: 1.1rem;
      margin: 12px 0;
      opacity: 0.7;
      font-weight: 300;
    }

    #instructions .footer-note {
      margin-top: 30px;
      font-size: 0.95rem;
      opacity: 0.5;
      font-style: italic;
    }

    #booking-area {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 50px;
      max-width: 1000px;
      padding: 40px;
      z-index: 100;
    }

    .booking-left {
      flex: 1;
      display: flex;
      justify-content: flex-end;
    }

    .booking-left img {
      max-width: 400px;
      height: auto;
      opacity: 0.9;
    }

    .booking-right {
      flex: 1;
      text-align: left;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .booking-right p {
      font-size: 1.5rem;
      color: #333;
      margin-bottom: 35px;
      font-weight: 300;
      line-height: 1.4;
    }

    .booking-buttons {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .try-again-btn {
      background-color: rgba(255, 255, 255, 0.5) !important;
      color: #333 !important;
      border: 1px solid rgba(0, 0, 0, 0.1) !important;
    }

    .try-again-btn:hover {
      background-color: rgba(255, 255, 255, 0.8) !important;
      transform: translateY(-2px);
    }

    @media (max-width: 768px) {
      #booking-area {
        flex-direction: column;
        text-align: center;
      }

      .booking-left,
      .booking-right {
        justify-content: center;
        align-items: center;
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <div id="timer" class="timer hidden">30</div>
  <div id="interaction-box" onclick="startExercise()">
    <div id="intro-container">
      <div id="instructions">
        <h2>There are four easy steps:</h2>
        <p>Breathe in deeply for around four seconds</p>
        <p>Hold your breath for around four seconds</p>
        <p>Breathe out for around four seconds</p>
      </div>
      <div id="start-button">Start breathing</div>
    </div>

    <div id="mascot-container"></div>
    <div id="breathing-circle">
      <div class="pattern-container" id="bg-pattern">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
      </div>
      <div id="circle-outline"></div>
      <div id="circle-progress-container">
        <div id="circle-progress-dot"></div>
      </div>
      <div id="circle-inner"></div>
      <div id="breathing-label">inhale</div>
    </div>
  </div>

  <div id="booking-area" class="hidden"
    style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90vw;">
    <div class="booking-left">
      <img src="https://static.wixstatic.com/media/5bf300_700fcef5cc584c328441ae428abb47cd~mv2.png"
        alt="Listenr Mascot">
    </div>
    <div class="booking-right">
      <p>There is no pressure. Take your time, If you want you can try again and get back to us</p>
      <div class="booking-buttons">
        <a href="#" onclick="location.reload();" class="book-btn try-again-btn">Try again</a>
        <a href="https://www.listenr.in/" target="_blank" class="book-btn">Book it</a>
      </div>
    </div>
  </div>

  <audio id="bg-music" loop autoplay>
    <source src="https://static.wixstatic.com/mp3/5bf300_929155e19585470482906a1e24e75255.mp3" type="audio/mpeg">
  </audio>

  <div id="audio-toggle" onclick="toggleAudio()">
    <svg id="speaker-on" viewBox="0 0 24 24">
      <path
        d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18.03,19.86 21,16.28 21,12C21,7.72 18.03,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16.02C15.5,15.29 16.5,13.77 16.5,12M3,9V15H7L12,20V4L7,9H3Z" />
    </svg>
    <svg id="speaker-off" class="hidden" viewBox="0 0 24 24">
      <path
        d="M12,4L9.91,6.09L12,8.18V4M16.5,12A4.5,4.5 0 0,0 14,7.97V10.18L16.45,12.63C16.48,12.43 16.5,12.22 16.5,12M19,12C19,12.96 18.83,13.88 18.53,14.73L20.07,16.27C20.67,14.96 21,13.5 21,12A9,9 0 0,0 14,3.23V5.29C16.89,6.15 19,8.83 19,12M4.27,3L3,4.27L7.73,9H3V15H7L12,20V13.27L16.25,17.52C15.58,18.04 14.83,18.46 14,18.7V20.77C15.38,20.45 16.63,19.82 17.68,18.96L19.73,21L21,19.73L12,10.73L4.27,3M12,6V8.61L10.91,7.52L12,6Z" />
    </svg>
  </div>

  <script>
    const frames = [
      'https://static.wixstatic.com/media/5bf300_56d79d8821aa4bb9b292b6707c0cf2ab~mv2.png',
      'https://static.wixstatic.com/media/5bf300_00d7b6025f9d42bfaf1f77915229892b~mv2.png',
      'https://static.wixstatic.com/media/5bf300_0084e5844eae44818c4aedb163b3e5ae~mv2.png',
      'https://static.wixstatic.com/media/5bf300_e5d4d5d62c394100805fd1dc4f6839c4~mv2.png'
    ];

    let currentFrame = 0;
    let frameInterval;
    let exerciseTimeout;

    window.onload = function () {
      const container = document.getElementById('mascot-container');
      frames.forEach((src, index) => {
        const img = document.createElement('img');
        img.src = src;
        img.className = 'mascot-img';
        img.id = 'f' + index;
        if (index === 0) img.classList.add('show');
        container.appendChild(img);
      });
    };

    function startExercise() {
      const introContainer = document.getElementById('intro-container');
      const interactionBox = document.getElementById('interaction-box');
      const mascotContainer = document.getElementById('mascot-container');
      const circle = document.getElementById('breathing-circle');
      const bookingArea = document.getElementById('booking-area');
      const timerElement = document.getElementById('timer');
      const progressContainer = document.getElementById('circle-progress-container');
      const innerCircle = document.getElementById('circle-inner');
      const label = document.getElementById('breathing-label');

      interactionBox.removeAttribute('onclick');
      introContainer.classList.add('invisible');

      const music = document.getElementById('bg-music');
      music.play().catch(e => console.log("Autoplay blocked"));

      setTimeout(() => {
        introContainer.classList.add('hidden');
        circle.classList.add('active');
        mascotContainer.classList.add('active');
        document.getElementById('bg-pattern').classList.add('active');

        progressContainer.style.animation = 'rotate-dot 4s cubic-bezier(0.45, 0, 0.55, 1) infinite alternate';
        innerCircle.style.animation = 'inner-breath 8s ease-in-out infinite';

        let timeLeft = 30;
        timerElement.innerText = timeLeft;
        timerElement.classList.remove('hidden');
        const countdown = setInterval(() => {
          timeLeft--;
          timerElement.innerText = (timeLeft > 0) ? timeLeft : 0;
          if (timeLeft <= 0) clearInterval(countdown);
        }, 1000);

        let direction = 1;
        frameInterval = setInterval(() => {
          const prevFrame = currentFrame;
          currentFrame += direction;
          if (currentFrame === frames.length - 1) direction = -1;
          if (currentFrame === 0) direction = 1;
          label.innerText = (direction === 1 && currentFrame < frames.length - 1) || (direction === -1 && currentFrame === 0) ? 'inhale' : 'exhale';
          document.getElementById('f' + currentFrame).classList.add('show');
          setTimeout(() => {
            document.getElementById('f' + prevFrame).classList.remove('show');
          }, 100);
        }, 1333);
      }, 1000);

      exerciseTimeout = setTimeout(() => {
        clearInterval(frameInterval);
        interactionBox.classList.add('hidden');
        timerElement.classList.add('hidden');
        bookingArea.classList.remove('hidden');
      }, 32000);
    }

    function toggleAudio() {
      const music = document.getElementById('bg-music');
      const speakerOn = document.getElementById('speaker-on');
      const speakerOff = document.getElementById('speaker-off');
      if (music.muted) {
        music.muted = false;
        speakerOn.classList.remove('hidden');
        speakerOff.classList.add('hidden');
      } else {
        music.muted = true;
        speakerOn.classList.add('hidden');
        speakerOff.classList.remove('hidden');
      }
    }

    document.addEventListener('click', () => {
      const music = document.getElementById('bg-music');
      if (music.paused) music.play().catch(() => { });
    }, { once: true });
  </script>
</body>

</html>
