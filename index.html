<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <header class="site-shell site-shell--header">
    <p class="eyebrow">Obsidian-Powered Journal</p>
    <h1 class="page-title">Blogs</h1>
    <p class="page-subtitle">Thoughts, process notes, and design experiments.</p>
  </header>

  <main class="site-shell">
    <section id="posts-list" class="posts-grid" aria-live="polite"></section>
  </main>

  <script>
    const postsList = document.getElementById('posts-list');

    const formatDate = (rawDate) => {
      const date = new Date(rawDate);
      if (Number.isNaN(date.getTime())) return rawDate;
      return new Intl.DateTimeFormat('en-GB', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      }).format(date);
    };

    const renderMessage = (message) => {
      postsList.innerHTML = `<p class="status-message">${message}</p>`;
    };

    const renderPosts = (posts) => {
      if (!Array.isArray(posts) || posts.length === 0) {
        renderMessage('No posts yet.');
        return;
      }

      const sortedPosts = [...posts].sort((a, b) => new Date(b.date) - new Date(a.date));

      const cards = sortedPosts.map((post) => {
        const safeTags = Array.isArray(post.tags) ? post.tags : [];
        const tagMarkup = safeTags.map((tag) => `<li class="tag-chip">${tag}</li>`).join('');
        const postUrl = `blog.html?post=${encodeURIComponent(post.file)}`;

        return `
          <article class="post-card">
            <p class="post-date">${formatDate(post.date)}</p>
            <h2 class="post-title">
              <a href="${postUrl}">${post.title}</a>
            </h2>
            <ul class="tag-list" aria-label="Tags">${tagMarkup}</ul>
            <a class="post-link" href="${postUrl}">Read article</a>
          </article>
        `;
      }).join('');

      postsList.innerHTML = cards;
    };

    const loadPosts = async () => {
      try {
        const response = await fetch('./posts.json', { cache: 'no-store' });
        if (!response.ok) {
          throw new Error(`Failed to load posts.json (${response.status})`);
        }
        const posts = await response.json();
        renderPosts(posts);
      } catch (error) {
        console.error(error);
        renderMessage('Unable to load posts.');
      }
    };

    loadPosts();
  </script>
</body>

</html>
