    <script src="transition.js" defer></script>
    <script>
        // ==========================================
        // 👾 ASCII / ARROW SWEEP EFFECT
        // ==========================================
        (function () {
            function initArrowSweep(selector) {
                const elements = document.querySelectorAll(selector);
                
                elements.forEach(el => {
                    let sweepInterval = null;

                    el.addEventListener('mouseenter', () => {
                        if (el.children.length > 0 && !el.classList.contains('nav-toggle-btn')) return;

                        const originalText = el.dataset.text || el.textContent.trim();
                        if (!el.dataset.text) el.dataset.text = originalText;

                        el.style.width = el.offsetWidth + 'px';
                        el.style.display = 'inline-block';
                        el.style.textAlign = 'center';

                        let iteration = 0;
                        clearInterval(sweepInterval);

                        sweepInterval = setInterval(() => {
                            const len = originalText.length;
                            let displayArray = originalText.split("");

                            for (let i = 0; i < len; i++) {
                                if (iteration < len) {
                                    if (i <= iteration) displayArray[i] = ">";
                                } else {
                                    const restoreIndex = iteration - len;
                                    displayArray[i] = (i <= restoreIndex) ? originalText[i] : ">";
                                }
                            }

                            el.textContent = displayArray.join("");

                            if (iteration >= len * 2) {
                                clearInterval(sweepInterval);
                                el.textContent = originalText;
                            }
                            iteration++;
                        }, 40);
                    });
                });
            }

            initArrowSweep('.nav-toggle-btn, .footer-link, .sw-tab, .dl-meta-link');
        })();

        (function () {
            const container = document.querySelector('.nav-toggle-container');
            const indicator = document.querySelector('.nav-toggle-indicator');
            const btns = document.querySelectorAll('.nav-toggle-btn');

            if (!container || !indicator) return;

            function updateToggle(btn) {
                if (!btn) return;

                btns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const btnRect = btn.getBoundingClientRect();
                const containerRect = container.getBoundingClientRect();
                const leftOffset = btnRect.left - containerRect.left - 4;

                indicator.style.width = btnRect.width + 'px';
                indicator.style.transform = `translateX(${leftOffset}px)`;
            }

            const navMap = {
                'toggleWhat': 'what.html',
                'toggleWhy': 'why.html',
                'toggleFree': 'forfree.html',
                'toggleNext': 'whatsnext.html'
            };

            btns.forEach(btn => {
                btn.addEventListener('click', () => {
                    updateToggle(btn);
                    
                    const targetUrl = navMap[btn.id];
                    if (targetUrl && !window.location.href.includes(targetUrl)) {
                        setTimeout(() => {
                            window.location.href = targetUrl;
                        }, 150);
                    }
                });
            });

            window.addEventListener('load', () => {
                const activeBtn = document.querySelector('.nav-toggle-btn.active');
                if (activeBtn) updateToggle(activeBtn);
            });

            window.addEventListener('resize', () => {
                const activeBtn = document.querySelector('.nav-toggle-btn.active');
                if (activeBtn) updateToggle(activeBtn);
            });
        })();
    </script>
