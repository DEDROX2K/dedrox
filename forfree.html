<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Free? | AirPaste</title>
    <link rel="icon" type="image/gif" href="images/logovar/browserlogo.gif">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Mansalva&family=Playfair+Display:wght@700&display=swap">
    <link rel="stylesheet" href="airpaste.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        body {
            background-color: var(--bg);
            cursor: none !important;
            /* Hide default cursor to use cube trail */
        }
    </style>
    <!-- Scripts for Cube Trail & Transitions -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script src="cube-trail.js" defer></script>
    <script src="navbar-logic.js" defer></script>
</head>

<body>
    <canvas id="cubeCanvas"></canvas>

    <!-- <div class="nav-logo">
        <a href="airpaste.html" style="display: block;">
            <img src="images/logovar/browserlogo.gif" alt="AirPaste Logo">
        </a>
    </div> -->

    <nav class="top-nav">
        <div class="nav-toggle-wrapper">
            <div class="nav-toggle-container">
                <div class="nav-toggle-gooey-layer">
                    <div class="nav-toggle-indicator"></div>
                </div>
                <div class="nav-toggle-buttons">
                    <button class="nav-toggle-btn" id="toggleHome">AirPaste</button>
                    <button class="nav-toggle-btn" id="toggleDownload">Download</button>
                    <button class="nav-toggle-btn" id="toggleShop">Shop</button>
                    <button class="nav-toggle-btn active" id="toggleFree">For Free?</button>
                    <button class="nav-toggle-btn" id="toggleNext">What's Next*</button>
                </div>
            </div>
        </div>
    </nav>

    <section class="manifesto-section" style="margin-top: 15vh;">
        <div class="manifesto-content">
            <h2 class="manifesto-subtitle">
                <span class="word-head">Truly Free. Forever.</span>
            </h2>
            <p class="manifesto-text">
                AirPaste is built on the principle of open access. There are no hidden fees, no "pro" tiers, and no
                subscriptions. It's free to download, free to use, and free to modify.
            </p>
            <p class="manifesto-text highlight">
                We're funded by the community and driven by a passion for better tools.
            </p>
        </div>
    </section>

    <footer class="main-footer" style="background: transparent; border-radius: 0; padding-top: 10vh;">
        <div class="footer-bottom">
            <div class="footer-copyright">©2026 AirPaste Sanctuary</div>
        </div>
    </footer>

    <script>
        // Initialize Lenis for smooth scroll
        const lenis = new Lenis();
        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);
    </script>
</body>

</html>
