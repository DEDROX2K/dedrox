<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Raghav</title>

    <!-- Three.js Libraries for 3D Chat Mode -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS3DRenderer.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <style>
        :root {
            --bg: #ECE7E3;
            --l1-blur: 0.99vw;
            --l1-radius: 5vh;
            --l1-width: 44vh;
            --l1-height: 88vh;
            --l1-x: 0vw;
            --l1-y: 0.93vh;
            --l2-blur: 2.56vw;
            --l2-radius: 25vh;
            --l2-width: 42.52vw;
            --l2-height: 90vh;
            --l2-x: 0vw;
            --l2-y: 0vh;
            --l3-blur: 2.60vw;
            --l3-radius: 46.88vw;
            --l3-width: 62.85vw;
            --l3-height: 93vh;
            --l3-x: 0vw;
            --l3-y: 0vh;
            --l4-blur: 2.60vw;
            --l4-radius: 46.88vw;
            --l4-width: 55.75vw;
            --l4-height: 91.41vh;
            --l4-x: 0vw;
            --l4-y: 0vh;
            --l5-blur: 3.13vw;
            --l5-radius: 30vh;
            --l5-width: 170vh;
            --l5-height: 95vh;
            --l5-x: 0vw;
            --l5-y: 0vh;
            --l6-blur: 3.13vw;
            --l6-radius: 30vh;
            --l6-width: 95.52vw;
            --l6-height: 113vh;
            --l6-x: 0vw;
            --l6-y: 0vh;
            --l7-blur: 3.13vw;
            --l7-radius: 46.88vw;
            --l7-width: 137.58vw;
            --l7-height: 130vh;
            --l7-x: 0vw;
            --l7-y: 0vh;
        }



        @keyframes cycleColors {
            0% {
                background-color: #CBEBFF;
            }

            20% {
                background-color: #CFF0EC;
            }

            40% {
                background-color: #D6F9D0;
            }

            60% {
                background-color: #DBFFBB;
            }

            80% {
                background-color: #CFF0EC;
            }

            100% {
                background-color: #CBEBFF;
            }
        }


        /* --- THE BACKGROUND LAYERS --- */
        .hero-layers {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 0;
        }

        .layer {
            position: absolute;
            will-change: transform, background-color;
            animation: cycleColors 18s infinite linear;
        }

        .layer-1 {
            width: var(--l1-width);
            height: var(--l1-height);
            border-radius: var(--l1-radius);
            filter: blur(var(--l1-blur));
            margin-left: var(--l1-x);
            margin-top: var(--l1-y);
            z-index: 7;
            animation-delay: 0s;
        }

        .layer-2 {
            width: var(--l2-width);
            height: var(--l2-height);
            border-radius: var(--l2-radius);
            filter: blur(var(--l2-blur));
            margin-left: var(--l2-x);
            margin-top: var(--l2-y);
            z-index: 6;
            animation-delay: -1.7s;
        }

        .layer-3 {
            width: var(--l3-width);
            height: var(--l3-height);
            border-radius: var(--l3-radius);
            filter: blur(var(--l3-blur));
            margin-left: var(--l3-x);
            margin-top: var(--l3-y);
            z-index: 5;
            animation-delay: -3.4s;
        }

        .layer-4 {
            width: var(--l4-width);
            height: var(--l4-height);
            border-radius: var(--l4-radius);
            filter: blur(var(--l4-blur));
            margin-left: var(--l4-x);
            margin-top: var(--l4-y);
            z-index: 4;
            animation-delay: -5.1s;
        }

        .layer-5 {
            width: var(--l5-width);
            height: var(--l5-height);
            border-radius: var(--l5-radius);
            filter: blur(var(--l5-blur));
            margin-left: var(--l5-x);
            margin-top: var(--l5-y);
            z-index: 3;
            animation-delay: -6.8s;
        }

        .layer-6 {
            width: var(--l6-width);
            height: var(--l6-height);
            border-radius: var(--l6-radius);
            filter: blur(var(--l6-blur));
            margin-left: var(--l6-x);
            margin-top: var(--l6-y);
            z-index: 2;
            animation-delay: -8.5s;
        }

        .layer-7 {
            width: var(--l7-width);
            height: var(--l7-height);
            border-radius: var(--l7-radius);
            filter: blur(var(--l7-blur));
            margin-left: var(--l7-x);
            margin-top: var(--l7-y);
            z-index: 1;
            animation-delay: -10.2s;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100dvh;
            overflow: hidden;
            background: var(--bg);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        #container-3d {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            isolation: isolate;
        }

        #loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            color: #1a1a1a;
            z-index: 9999;
            font-size: 1.2rem;
            transition: opacity 0.5s ease;
        }

        .chat-phone-shell {
            position: relative;
            width: 375px;
            height: 812px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 18px;
            /* border: 2px solid #1f2630; */
            background: #d5d8e3;
            box-shadow: 0 22px 60px #fdfffc, inset 0 1px 0 #e9fcff;
            user-select: none;
            -webkit-user-select: none;
            pointer-events: auto;
            touch-action: manipulation;
            opacity: 1 !important;
        }

        .ios-status-bar {
            min-height: 28px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 8px;
            padding: 0 10px;
            color: #edf4ff;
            background: linear-gradient(to bottom, #6e87aa 0%, #4c688f 48%, #355277 100%);
            font-size: 12px;
            font-weight: 700;
            text-shadow: 0 -1px 0 rgba(0, 0, 0, 0.35);
            box-shadow: inset 0 -1px 0 rgba(0, 0, 0, 0.22);
        }

        .ios-status-left,
        .ios-status-right {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
        }

        .ios-status-right {
            justify-content: flex-end;
        }

        .ios-status-center {
            font-size: 13px;
            letter-spacing: 0.02em;
        }

        .ios-signal {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 12px;
        }

        .ios-signal-bar {
            width: 4px;
            background: #eef5ff;
            border-radius: 1px 1px 0 0;
        }

        .ios-signal-1 {
            height: 5px;
        }

        .ios-signal-2 {
            height: 7px;
        }

        .ios-signal-3 {
            height: 9px;
        }

        .ios-signal-4 {
            height: 11px;
        }

        .ios-signal-5 {
            height: 13px;
            opacity: 0.55;
        }

        .ios-battery {
            width: 28px;
            height: 13px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.75);
            border-radius: 3px;
            padding: 1px;
            box-sizing: border-box;
        }

        .ios-battery::after {
            content: '';
            position: absolute;
            right: -4px;
            top: 3px;
            width: 3px;
            height: 5px;
            border-radius: 0 2px 2px 0;
            background: rgba(255, 255, 255, 0.75);
        }

        .ios-battery-fill {
            width: 19%;
            height: 100%;
            border-radius: 1px;
            background: linear-gradient(to bottom, #ff9288 0%, #c84743 100%);
        }

        .chat-header {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 10px;
            padding: 8px 10px 10px;
            background: linear-gradient(to bottom, #cddcf0 0%, #97b3d3 45%, #4a6a93 100%);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            border-bottom: 1px solid rgba(60, 84, 116, 0.9);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.45);
        }

        .chat-nav-btn {
            position: relative;
            min-width: 96px;
            height: 40px;
            border-radius: 12px;
            border: 1px solid #37567c;
            background: linear-gradient(to bottom, #7896bb 0%, #5677a5 49%, #466896 100%);
            color: #f7fbff;
            font-size: 15px;
            font-weight: 700;
            text-shadow: 0 -1px 0 rgba(0, 0, 0, 0.35);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.28), 0 1px 2px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            touch-action: manipulation;
            transition: box-shadow 0.22s ease, filter 0.22s ease;
        }

        .chat-nav-btn.back {
            padding: 0 18px;
        }

        .chat-nav-btn:hover,
        .chat-nav-btn:focus-visible {
            filter: brightness(0.96);
            box-shadow:
                inset 0 3px 5px rgba(0, 0, 0, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.15),
                0 1px 1px rgba(0, 0, 0, 0.12);
        }

        .chat-nav-btn:active {
            filter: brightness(0.92);
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .chat-title {
            color: #ffffff;
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.03em;
            text-shadow: 0 -1px 0 rgba(0, 0, 0, 0.38), 0 1px 0 rgba(255, 255, 255, 0.18);
        }

        .chat-messages-area {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 18px 12px 12px;
            background: linear-gradient(to bottom, #dce0e8 0%, #d2d6df 100%);
            pointer-events: auto;
            touch-action: pan-y;
            -webkit-overflow-scrolling: touch;
        }

        .chat-timestamp {
            align-self: center;
            color: #707581;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        .chat-bubble {
            position: relative;
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 22px;
            font-size: 15px;
            line-height: 1.26;
            letter-spacing: -0.01em;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.55);
            filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.15));
            animation: bubbleIn 0.24s ease-out;
            transform-style: preserve-3d;
        }

        @keyframes bubbleIn {
            0% {
                opacity: 0;
                transform: translateY(8px) scale(0.98);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .chat-bubble-recv {
            align-self: flex-start;
            background: linear-gradient(to bottom, #ffffff 0%, #ececec 100%);
            border: 1px solid #a9adb4;
            color: #141414;
        }

        .chat-bubble-recv::before {
            content: '';
            position: absolute;
            left: -7px;
            bottom: 6px;
            width: 16px;
            height: 16px;
            background: #ececec;
            border-left: 1px solid #a9adb4;
            border-bottom: 1px solid #a9adb4;
            border-bottom-left-radius: 14px;
            clip-path: polygon(100% 0, 0 100%, 100% 100%);
            transform: translateZ(-1px);
        }

        .chat-bubble-send {
            align-self: flex-end;
            background: linear-gradient(to bottom, #b5eb69 0%, #94db38 34%, #73c21e 100%);
            border: 1px solid #5d971f;
            color: #111a08;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.25);
        }

        .chat-bubble-send::after {
            content: '';
            position: absolute;
            right: -7px;
            bottom: 6px;
            width: 16px;
            height: 16px;
            background: #73c21e;
            border-right: 1px solid #5d971f;
            border-bottom: 1px solid #5d971f;
            border-bottom-right-radius: 14px;
            clip-path: polygon(0 0, 0 100%, 100% 100%);
            transform: translateZ(-1px);
        }

        .chat-input-area {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 8px;
            padding: 9px 8px;
            background: linear-gradient(to bottom, #f0f1f3 0%, #cfd2d8 52%, #b7bac2 100%);
            border-top: 1px solid #959aa2;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }

        .chat-input-wrapper {
            display: flex;
            align-items: flex-start;
            min-height: 42px;
            padding: 10px 16px;
            border-radius: 22px;
            border: 1px solid #9ea3aa;
            background: linear-gradient(to bottom, #ffffff 0%, #f1f2f4 100%);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.14), 0 1px 0 rgba(255, 255, 255, 0.72);
            transition: transform 0.28s ease, opacity 0.28s ease, box-shadow 0.28s ease;
        }

        .chat-input-text {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            font-size: 16px;
            line-height: 1.25;
            color: #1b1c1e;
            pointer-events: none;
            resize: none;
            overflow: hidden;
            min-height: 20px;
            max-height: 88px;
            padding: 0;
            margin: 0;
            white-space: pre-wrap;
            font-family: Arial, sans-serif;

        }


        .chat-input-text::placeholder {
            color: #a4a8ae;
        }

        .chat-btn-send {
            position: relative;
            width: 84px;
            min-width: 84px;
            height: 42px;
            padding: 0 18px;
            border-radius: 21px;
            border: 1px solid #4f8420;
            background: linear-gradient(to bottom, #a9df5e 0%, #78bd2b 54%, #63a820 100%);
            color: #f7fff1;
            font-size: 17px;
            font-weight: 700;
            text-shadow: 0 -1px 0 rgba(0, 0, 0, 0.3);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.42), 0 1px 2px rgba(0, 0, 0, 0.2);
            opacity: 0.55;
            pointer-events: none;
            touch-action: manipulation;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: width 0.34s ease, min-width 0.34s ease, border-radius 0.34s ease, box-shadow 0.22s ease, filter 0.18s ease;
        }

        .chat-btn-send.active {
            opacity: 1;
            pointer-events: auto;
        }

        .chat-btn-send.active:hover,
        .chat-btn-send.active:focus-visible {
            filter: brightness(0.96);
            box-shadow:
                inset 0 3px 6px rgba(0, 0, 0, 0.22),
                inset 0 1px 0 rgba(255, 255, 255, 0.2),
                0 1px 1px rgba(0, 0, 0, 0.15);
        }

        .chat-btn-send.active:active {
            filter: brightness(0.92);
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.28);
        }

        .chat-btn-send-label,
        .chat-btn-send-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.18s ease, transform 0.24s ease;
        }

        .chat-btn-send-icon {
            position: absolute;
            inset: 0;
            font-size: 16px;
            opacity: 0;
            transform: scale(0.35);
        }

        .chat-input-area.is-sending .chat-input-wrapper {
            transform: translateX(3px) scaleX(0.985);
            opacity: 0.82;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.11), 0 1px 0 rgba(255, 255, 255, 0.58);
        }

        .chat-input-area.is-sending .chat-btn-send {
            width: 42px;
            min-width: 42px;
            padding: 0;
            border-radius: 50%;
            transform: scale(0.96);
        }

        .chat-input-area.is-sending .chat-btn-send-label {
            opacity: 0;
            transform: scale(0.68);
        }

        .chat-input-area.is-sending .chat-btn-send-icon {
            opacity: 1;
            transform: scale(1);
        }

        .chat-keyboard {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 12px 6px 16px;
            background: linear-gradient(to bottom, #9ea6b2 0%, #78818d 36%, #5c6572 100%);
            border-top: 1px solid rgba(255, 255, 255, 0.35);
            pointer-events: auto;
        }

        .kb-row {
            display: flex;
            justify-content: center;
            gap: 6px;
        }

        .kb-row-offset {
            padding: 0 16px;
        }

        .kb-key {
            flex: 1;
            min-width: 0;
            height: 44px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to bottom, #ffffff 0%, #eef0f4 72%, #d9dde3 100%);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9), 0 2px 3px rgba(0, 0, 0, 0.32);
            color: #09090a;
            font-size: 21px;
            font-weight: 700;
            cursor: pointer;
            transition: filter 0.2s ease, box-shadow 0.2s ease;
        }

        .kb-key:hover {
            filter: brightness(0.97);
            box-shadow:
                inset 0 2px 4px rgba(0, 0, 0, 0.12),
                inset 0 1px 0 rgba(255, 255, 255, 0.4),
                0 1px 1px rgba(0, 0, 0, 0.15);
        }

        .kb-key:active {
            filter: brightness(0.92);
            box-shadow: inset 0 3px 6px rgba(0, 0, 0, 0.2), 0 0 0 rgba(0, 0, 0, 0);
        }

        .kb-key-dark {
            background: linear-gradient(to bottom, #a6aeb9 0%, #7b8592 100%);
            color: #ffffff;
        }

        .kb-key-dark:hover {
            filter: brightness(0.9);
            box-shadow:
                inset 0 2px 4px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1),
                0 1px 1px rgba(0, 0, 0, 0.2);
        }

        .kb-key-wide {
            flex: 1.35;
        }

        .kb-key-space {
            flex: 4.8;
            font-size: 16px;
            color: #4e535d;
        }

        .kb-key-return {
            flex: 2.2;
            font-size: 17px;
        }

        .chat-typing {
            display: flex;
            align-items: center;
            gap: 5px;
            align-self: flex-start;
            padding: 10px 14px;
            border-radius: 22px;
            background: linear-gradient(to bottom, #ffffff 0%, #ececec 100%);
            border: 1px solid #a9adb4;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .chat-typing.active {
            opacity: 1;
        }

        .chat-typing span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #8d9299;
            animation: typingBounce 1.2s infinite ease-in-out both;
        }

        .chat-typing span:nth-child(2) {
            animation-delay: 0.12s;
        }

        .chat-typing span:nth-child(3) {
            animation-delay: 0.24s;
        }

        @keyframes typingBounce {

            0%,
            80%,
            100% {
                transform: translateY(0) scale(0.8);
                opacity: 0.45;
            }

            40% {
                transform: translateY(-2px) scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="hero-layers">
        <div class="layer layer-7" data-speed="0.1"></div>
        <div class="layer layer-6" data-speed="0.2"></div>
        <div class="layer layer-5" data-speed="0.4"></div>
        <div class="layer layer-4" data-speed="0.6"></div>
        <div class="layer layer-3" data-speed="0.8"></div>
        <div class="layer layer-2" data-speed="1.0"></div>
        <div class="layer layer-1" data-speed="1.2"></div>
    </div>

    <div id="loading-overlay">Initializing 3D Chat...</div>
    <div id="container-3d"></div>

    <!-- Hidden UI Source for CSS3DRenderer -->
    <div id="ui-source" style="display: none;">
        <div class="chat-phone-shell">
            <div class="ios-status-bar">
                <div class="ios-status-left">
                    <div class="ios-signal">
                        <div class="ios-signal-bar ios-signal-1"></div>
                        <div class="ios-signal-bar ios-signal-2"></div>
                        <div class="ios-signal-bar ios-signal-3"></div>
                        <div class="ios-signal-bar ios-signal-4"></div>
                        <div class="ios-signal-bar ios-signal-5"></div>
                    </div>
                    <span>Verizon</span>
                    <span>3G</span>
                </div>
                <div class="ios-status-center">10:51 AM</div>
                <div class="ios-status-right">
                    <span>19%</span>
                    <div class="ios-battery">
                        <div class="ios-battery-fill"></div>
                    </div>
                </div>
            </div>
            <div class="chat-header">
                <button class="chat-nav-btn back" id="chat-btn-back" type="button">Go back</button>
                <div class="chat-title"><span id="chat-contact-name">Raghav</span></div>
                <button class="chat-nav-btn" id="chat-btn-clear" type="button">Restart</button>
            </div>

            <div class="chat-messages-area" id="chat-messages-area">
                <div class="chat-timestamp">Today 10:51 AM</div>
            </div>

            <div class="chat-input-area">
                <div class="chat-input-wrapper"><textarea class="chat-input-text" id="chat-input-text"
                        placeholder="Text Message" readonly rows="1"></textarea></div>
                <button class="chat-btn-send" id="chat-btn-send" type="button">
                    <span class="chat-btn-send-label">Send</span>
                    <span class="chat-btn-send-icon" aria-hidden="true">&#9654;</span>
                </button>
            </div>

            <div class="chat-keyboard" aria-hidden="true">
                <div class="kb-row">
                    <div class="kb-key">Q</div>
                    <div class="kb-key">W</div>
                    <div class="kb-key">E</div>
                    <div class="kb-key">R</div>
                    <div class="kb-key">T</div>
                    <div class="kb-key">Y</div>
                    <div class="kb-key">U</div>
                    <div class="kb-key">I</div>
                    <div class="kb-key">O</div>
                    <div class="kb-key">P</div>
                </div>
                <div class="kb-row kb-row-offset">
                    <div class="kb-key">A</div>
                    <div class="kb-key">S</div>
                    <div class="kb-key">D</div>
                    <div class="kb-key">F</div>
                    <div class="kb-key">G</div>
                    <div class="kb-key">H</div>
                    <div class="kb-key">J</div>
                    <div class="kb-key">K</div>
                    <div class="kb-key">L</div>
                </div>
                <div class="kb-row">
                    <div class="kb-key kb-key-dark kb-key-wide">⇧</div>
                    <div class="kb-key">Z</div>
                    <div class="kb-key">X</div>
                    <div class="kb-key">C</div>
                    <div class="kb-key">V</div>
                    <div class="kb-key">B</div>
                    <div class="kb-key">N</div>
                    <div class="kb-key">M</div>
                    <div class="kb-key kb-key-dark kb-key-wide">⌫</div>
                </div>
                <div class="kb-row">
                    <div class="kb-key kb-key-dark kb-key-wide">123</div>
                    <div class="kb-key kb-key-dark kb-key-wide">mic</div>
                    <div class="kb-key kb-key-space">space</div>
                    <div class="kb-key kb-key-dark kb-key-return">return</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CHAT_SETTINGS = {
            contactName: 'Raghav',
            timestampLabel: 'Today 10:51 AM',
            initialPromptDelay: 50,
            draftRevealDuration: 2000,
            maxDraftLines: 4,
            sendMorphDuration: 380,
            replyTypingDelay: 1000,
            nextDraftDelay: 1000,
            loopThread: false,
            // Flinch Controls
            flinchIntensity: 0.01,    // How much it tilts (0.13 is subtle, 0.25 is heavy)
            flinchDepth: -0.004,       // How much it pushes back into the screen
            flinchInDuration: 0.07,   // Speed of the "hit" (very low = instant)
            flinchOutDuration: 0.15,  // Speed of the "bounce back"
            flinchElasticity: 1    // 1.0 is rigid, 0.4 is very jiggly/springy
        };

        // Premade chat controls:
        // - draft: text shown in the input before the visitor taps Send
        // - sent: optional sent bubble override; defaults to `draft`
        // - reply: your response
        // - draftRevealDuration: optional override for the typed-in prompt speed
        // - typingDelay / nextDraftDelay: optional per-message timing overrides
        const CHAT_THREAD = [
            {
                draft: "Are you currently working?",
                reply: [
                    "Yep, AIRCARDS based in Newcastle, UK. Working as a product development assistant",
                    "After finishing my UX masters in birmingham I povoted towards product development and project management. Working on interactive displays and XR/AR experiences with "
                ]
            },
            {
                draft: "Hey Raghav, so… what do you actually *do*?",
                reply: "Design stuff that’s not boring — apps, Interfaces, softwares. and lots of tools and plugins to increase productivity and I mentor juniors and conduct semminars"
            },
            {
                draft: "Okay but like… what can you do for *me*?",
                reply: "Well this is a pre made chat, but I would really want to know what you are working on!"
            },
            {
                draft: "Do you have experience in development side of things?",
                reply: "Yea I recently collaborated with 3 partners to create a free and open source bookmark tool made by loving designers. This journey taught me everything about react, tauri, and dev ops"
            },
            {
                draft: "What do you think of me?",
                reply: "Bold of you to ask. You seem like someone with a cool idea and just enough chaos to make it interesting. I like that."
            },
            {
                draft: "Would we get along working together?",
                reply: "If you like honest feedback, fast iterations, and the occasional unhinged idea — yeah, we’ll be fine."
            },
            {
                draft: "Alright… I might have something for you 👀",
                reply: "Perfect. Send it over before you overthink it."
            }
        ];

        let currentExchangeIndex = 0;
        let isTyping = false;
        let isSending = false;
        let isDraftTyping = false;
        let chatSequenceId = 0;

        let scene, camera, renderer, cssRenderer;
        let phoneModel, phoneScreenMesh;
        let targetRotX = 0, targetRotY = 0;
        let currentRotX = 0, currentRotY = 0;
        const flinchObj = { z: 0, rx: 0, ry: 0 };
        const chatScreenEl = document.querySelector('.chat-phone-shell');

        setupChatLogic(chatScreenEl);
        init3D(chatScreenEl);

        function init3D(uiSource) {
            const container = document.getElementById('container-3d');

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 0, 1.8); // Adjusted camera to visually scale to ~80% instead of being tiny

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.domElement.style.position = 'absolute';
            renderer.domElement.style.pointerEvents = 'none';
            container.appendChild(renderer.domElement);

            cssRenderer = new THREE.CSS3DRenderer();
            cssRenderer.setSize(window.innerWidth, window.innerHeight);
            cssRenderer.domElement.style.position = 'absolute';
            cssRenderer.domElement.style.top = '0';
            container.appendChild(cssRenderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
            dirLight.position.set(2, 3, 2);
            scene.add(dirLight);

            if (uiSource?.parentNode) {
                uiSource.parentNode.removeChild(uiSource);
            }

            const loader = new THREE.GLTFLoader();
            loader.load('threeD/phone.glb', (gltf) => {
                phoneModel = gltf.scene;

                phoneModel.traverse((child) => {
                    if (child.isMesh) {
                        if (child.name === "Phone_Screen" || child.name.toLowerCase().includes("screen")) {
                            phoneScreenMesh = child;
                            child.material.color.setHex(0x000000);
                            child.material.opacity = 0;
                            child.material.transparent = true;
                            child.material.blending = THREE.NoBlending;
                        }
                    }
                });

                const box = new THREE.Box3().setFromObject(phoneModel);
                const center = box.getCenter(new THREE.Vector3());
                phoneModel.position.sub(center);
                phoneModel.scale.setScalar(2.5); // Reverted scale so camera handles sizing

                const cssObject = new THREE.CSS3DObject(uiSource);
                cssObject.scale.setScalar(0.00062);
                if (phoneScreenMesh) {
                    cssObject.position.copy(phoneScreenMesh.position);
                    cssObject.quaternion.copy(phoneScreenMesh.quaternion);
                } else {
                    cssObject.position.set(0, 0, 0.015);
                }
                phoneModel.add(cssObject);

                scene.add(phoneModel);

                // Entry animation
                phoneModel.position.y = 10;
                phoneModel.rotation.x = Math.PI;
                phoneModel.userData.baseRotX = Math.PI;

                document.getElementById('loading-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 500);

                gsap.to(phoneModel.position, { y: 0, duration: 2, ease: "expo.out" });
                gsap.to(phoneModel.userData, {
                    baseRotX: 0,
                    duration: 2,
                    ease: "expo.out",
                    onComplete: window.triggerConversation
                });
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                cssRenderer.setSize(window.innerWidth, window.innerHeight);
            });

            window.addEventListener('pointermove', (e) => {
                const mx = (e.clientX / window.innerWidth) * 2 - 1;
                const my = -(e.clientY / window.innerHeight) * 2 + 1;
                targetRotY = mx * 0.13;
                targetRotX = -my * 0.13;
            });

            window.addEventListener('pointerdown', (e) => {
                const mx = (e.clientX / window.innerWidth) * 2 - 1;
                const my = -(e.clientY / window.innerHeight) * 2 + 1;

                const s = CHAT_SETTINGS;
                gsap.killTweensOf(flinchObj);
                gsap.to(flinchObj, {
                    z: s.flinchDepth,
                    rx: -my * s.flinchIntensity,
                    ry: mx * s.flinchIntensity,
                    duration: s.flinchInDuration,
                    ease: "power3.out",
                    onComplete: () => {
                        gsap.to(flinchObj, {
                            z: 0, rx: 0, ry: 0,
                            duration: s.flinchOutDuration,
                            ease: `elastic.out(1, ${s.flinchElasticity})`
                        });
                    }
                });
            });

            requestAnimationFrame(renderLoop);
        }

        function renderLoop() {
            if (phoneModel) {
                currentRotX += (targetRotX - currentRotX) * 0.1;
                currentRotY += (targetRotY - currentRotY) * 0.1;

                const baseRotX = phoneModel.userData.baseRotX || 0;
                phoneModel.rotation.x = baseRotX + currentRotX + flinchObj.rx;
                phoneModel.rotation.y = currentRotY + flinchObj.ry;
                phoneModel.position.z = flinchObj.z;
            }

            renderer.render(scene, camera);
            cssRenderer.render(scene, camera);
            requestAnimationFrame(renderLoop);
        }

        function setupChatLogic(screenEl) {
            if (!screenEl) return;

            const contactNameEl = document.getElementById('chat-contact-name');
            const inputArea = document.querySelector('.chat-input-area');
            const btnBack = document.getElementById('chat-btn-back');
            const btnClear = document.getElementById('chat-btn-clear');
            const messagesArea = document.getElementById('chat-messages-area');
            const inputText = document.getElementById('chat-input-text');
            const btnSend = document.getElementById('chat-btn-send');

            if (!contactNameEl || !inputArea || !btnBack || !btnClear || !messagesArea || !inputText || !btnSend) {
                return;
            }
            let activeExchange = null;
            let pendingTimeoutId = null;

            contactNameEl.textContent = CHAT_SETTINGS.contactName;

            const resetMessages = () => {
                messagesArea.innerHTML = `<div class="chat-timestamp">${CHAT_SETTINGS.timestampLabel}</div>`;
            };

            const clearPendingStep = () => {
                if (pendingTimeoutId !== null) {
                    clearTimeout(pendingTimeoutId);
                    pendingTimeoutId = null;
                }
            };

            const scheduleStep = (callback, delay) => {
                clearPendingStep();
                pendingTimeoutId = window.setTimeout(() => {
                    pendingTimeoutId = null;
                    callback();
                }, delay);
            };

            const syncDraftBoxHeight = () => {
                inputText.style.height = '0px';
                const inputStyles = window.getComputedStyle(inputText);
                const lineHeight = parseFloat(inputStyles.lineHeight) || 20;
                const maxHeight = (CHAT_SETTINGS.maxDraftLines * lineHeight) + 2;
                inputText.style.height = `${Math.min(inputText.scrollHeight, maxHeight)}px`;
            };

            const updateSendState = () => {
                const canSend = !isTyping && !isSending && !isDraftTyping && !!activeExchange && inputText.value.trim().length > 0;
                btnSend.classList.toggle('active', canSend);
                btnSend.setAttribute('aria-disabled', String(!canSend));
            };

            const setDraft = (text = '') => {
                inputText.value = text;
                syncDraftBoxHeight();
                updateSendState();
            };

            const typeDraftText = (text = '', revealDuration = CHAT_SETTINGS.draftRevealDuration) => {
                const draft = String(text ?? '');
                clearPendingStep();
                isDraftTyping = true;
                setDraft('');

                if (!draft.length) {
                    isDraftTyping = false;
                    updateSendState();
                    return;
                }

                const startTime = performance.now();
                let visibleChars = 0;

                const revealNextChunk = () => {
                    const elapsed = performance.now() - startTime;
                    const progress = Math.min(1, elapsed / Math.max(1, revealDuration));
                    const nextVisibleChars = Math.max(1, Math.ceil(draft.length * progress));
                    visibleChars = Math.max(visibleChars, nextVisibleChars);
                    setDraft(draft.slice(0, visibleChars));
                    messagesArea.scrollTop = messagesArea.scrollHeight;

                    if (visibleChars >= draft.length) {
                        isDraftTyping = false;
                        updateSendState();
                        return;
                    }

                    scheduleStep(revealNextChunk, 16);
                };

                scheduleStep(revealNextChunk, 20);
            };

            const getCurrentExchange = () => {
                if (!CHAT_THREAD.length) return null;
                if (currentExchangeIndex >= CHAT_THREAD.length) {
                    if (!CHAT_SETTINGS.loopThread) return null;
                    currentExchangeIndex = 0;
                }
                return CHAT_THREAD[currentExchangeIndex];
            };

            const stageCurrentDraft = () => {
                const exchange = getCurrentExchange();
                activeExchange = exchange;
                if (!exchange) {
                    isDraftTyping = false;
                    setDraft('');
                    return;
                }

                typeDraftText(exchange.draft, exchange.draftRevealDuration ?? CHAT_SETTINGS.draftRevealDuration);
            };

            const resetConversation = (autoStart = false) => {
                chatSequenceId += 1;
                clearPendingStep();
                currentExchangeIndex = 0;
                activeExchange = null;
                isTyping = false;
                isSending = false;
                isDraftTyping = false;
                inputArea.classList.remove('is-sending');
                resetMessages();
                setDraft('');
                if (autoStart) window.triggerConversation();
            };

            window.triggerConversation = () => {
                if (!CHAT_THREAD.length || activeExchange || isTyping || isSending || isDraftTyping) return;
                const runId = chatSequenceId;
                scheduleStep(() => {
                    if (runId !== chatSequenceId) return;
                    stageCurrentDraft();
                }, CHAT_SETTINGS.initialPromptDelay);
            };

            const appendBubble = (sender, text) => {
                const bubble = document.createElement('div');
                bubble.className = `chat-bubble chat-bubble-${sender === 'viewer' ? 'send' : 'recv'}`;
                bubble.innerText = text;
                messagesArea.appendChild(bubble);
                messagesArea.scrollTop = messagesArea.scrollHeight;
            };

            const showTypingIndicator = () => {
                const typing = document.createElement('div');
                typing.className = 'chat-typing active';
                typing.innerHTML = '<span></span><span></span><span></span>';
                messagesArea.appendChild(typing);
                messagesArea.scrollTop = messagesArea.scrollHeight;
                return typing;
            };

            const playExchange = (exchange) => {
                const runId = chatSequenceId;
                const sentText = (inputText.value.trim() || exchange.sent || exchange.draft).trim();

                activeExchange = null;
                isSending = true;
                inputArea.classList.add('is-sending');
                updateSendState();

                scheduleStep(() => {
                    if (runId !== chatSequenceId) return;

                    inputArea.classList.remove('is-sending');
                    isSending = false;
                    appendBubble('viewer', sentText);
                    setDraft('');

                    const replies = Array.isArray(exchange.reply) ? exchange.reply : [exchange.reply];

                    const showNextReply = (replyIndex) => {
                        if (runId !== chatSequenceId) return;

                        if (replyIndex >= replies.length) {
                            isTyping = false;
                            currentExchangeIndex += 1;
                            updateSendState();

                            scheduleStep(() => {
                                if (runId !== chatSequenceId) return;
                                stageCurrentDraft();
                            }, exchange.nextDraftDelay ?? CHAT_SETTINGS.nextDraftDelay);
                            return;
                        }

                        isTyping = true;
                        updateSendState();
                        const typingIndicator = showTypingIndicator();

                        scheduleStep(() => {
                            if (runId !== chatSequenceId) return;

                            if (typingIndicator.parentNode) {
                                typingIndicator.parentNode.removeChild(typingIndicator);
                            }

                            appendBubble('contact', replies[replyIndex]);

                            // Small gap between multiple bubbles
                            scheduleStep(() => showNextReply(replyIndex + 1), 600);
                        }, exchange.typingDelay ?? CHAT_SETTINGS.replyTypingDelay);
                    };

                    showNextReply(0);
                }, exchange.sendMorphDuration ?? CHAT_SETTINGS.sendMorphDuration);
            };

            btnSend.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (isTyping || isSending || isDraftTyping || !activeExchange || !btnSend.classList.contains('active')) return;
                playExchange(activeExchange);
            });

            btnBack.addEventListener('click', () => {
                window.location.href = 'prototype.html';
            });

            btnClear.addEventListener('click', () => {
                resetConversation(true);
            });

            resetConversation(false);
        }
    </script>
</body>
